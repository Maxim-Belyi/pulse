services: 
  postgres:
    image: postgres:16-alpine
    container_name: postgres_pulse
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes: 
      - postgres_pulse:/var/lib/postgresql/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rmq_pulse
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: quest
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: redis_pulse
    ports:
      - "6379:6379"
    volumes: 
      - redis:/data
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: clickhouse_pulse
    ports: 
      - "8123:8123"
      - "9000:9000"
    volumes: 
      - clickhouse:/var/lib/clickhouse
    restart: unless-stopped

volumes:
  postgres_pulse:
  redis:
  clickhouse:
